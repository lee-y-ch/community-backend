name: Backend CI/CD

on:
  push:
    branches:
      - main       # main push  -> CI + CD (빌드 + ECR push + 배포)
      - develop    # develop push -> CI only (빌드 + ECR push, 배포 안 함)

# OIDC 로 AWS 임시 자격증명을 받기 위해 필요한 최소 권한
permissions:
  id-token: write   # OIDC 토큰 발급용 (필수)
  contents: read    # 소스 체크아웃용

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 501479502338.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: community/backend
  BACKEND_INSTANCE_ID: i-0e64cceeae8779491

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 테스트 코드가 아직 없어 test 단계는 생략한다.
      # - name: Run tests
      #   run: ./gradlew test

      - name: Build (bootJar)
        run: ./gradlew bootJar -x test

      - name: Compute image tag
        id: meta
        run: echo "image_tag=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::501479502338:role/leo-github-actions-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
          docker build -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" .
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

  deploy:
    name: Deploy to EC2 via SSM
    needs: build-and-push
    # main 브랜치에서만 배포한다. develop 은 여기까지 오지 않는다.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::501479502338:role/leo-github-actions-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM Run Command
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"

          COMMAND_ID=$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --instance-ids "${BACKEND_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy community-backend ${IMAGE_TAG}" \
            --parameters commands="cd /home/ubuntu/community-backend && bash deploy.sh ${IMAGE_TAG}" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: ${COMMAND_ID}"

          echo "배포 실행 대기 중..."
          if ! aws ssm wait command-executed \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${BACKEND_INSTANCE_ID}"; then
            echo "::warning::wait 가 timeout 되었을 수 있습니다. 실제 결과를 아래에서 확인합니다."
          fi

          STATUS=$(aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${BACKEND_INSTANCE_ID}" \
            --query "Status" --output text)

          echo "===== SSM stdout ====="
          aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${BACKEND_INSTANCE_ID}" \
            --query "StandardOutputContent" --output text

          echo "===== SSM stderr ====="
          aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${BACKEND_INSTANCE_ID}" \
            --query "StandardErrorContent" --output text

          echo "배포 상태: ${STATUS}"
          if [ "${STATUS}" != "Success" ]; then
            echo "::error::배포 실패 (status=${STATUS})"
            exit 1
          fi