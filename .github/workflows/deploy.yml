name: Backend CI/CD

on:
  push:
    branches:
      - main       # main    -> 빌드 + ECR push + 배포
      - develop    # develop -> 빌드 검증만 (push X, 배포 X)

# OIDC 로 AWS 임시 자격증명을 받기 위해 필요한 최소 권한
permissions:
  id-token: write   # OIDC 토큰 발급용 (main step 에서만 실제 사용)
  contents: read    # 소스 체크아웃용

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 501479502338.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: community/backend
  BACKEND_INSTANCE_ID: i-0e64cceeae8779491

jobs:
  build-and-deploy:
    name: Build (& Deploy on main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Compute image tag
        id: meta
        run: echo "image_tag=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # ---- main 브랜치에서만: OIDC 자격증명 ----
      - name: Configure AWS credentials (OIDC)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::501479502338:role/leo-github-actions-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check if image tag already exists in ECR
        id: check
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
          if aws ecr describe-images \
              --region "${AWS_REGION}" \
              --repository-name "${ECR_REPOSITORY}" \
              --image-ids imageTag="${IMAGE_TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "이미 존재하는 태그(${IMAGE_TAG}) → build/push 건너뜀"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "새 태그(${IMAGE_TAG}) → build/push 진행"
          fi

      # ---- 빌드 ----
      # main: 태그가 없을 때만 ECR 태그로 빌드
      # develop: 항상 검증용 로컬 태그로 빌드
      - name: Build Docker image
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
              echo "이미 ECR 에 있는 이미지이므로 빌드를 건너뜁니다."
            else
              IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
              docker build -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" .
            fi
          else
            docker build -t community-backend:ci-check .
          fi

      # ---- ECR push (main + 태그 미존재 시에만) ----
      - name: Push image to ECR
        if: github.ref == 'refs/heads/main' && steps.check.outputs.exists == 'false'
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

      # ---- 배포 (main 이면 항상, 태그 존재 여부와 무관) ----
      - name: Deploy via SSM Run Command
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"

          COMMAND_ID=$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --instance-ids "${BACKEND_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy community-backend ${IMAGE_TAG}" \
            --parameters commands="cd /home/ubuntu/community-backend && bash deploy.sh ${IMAGE_TAG}" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: ${COMMAND_ID}"

          echo "배포 실행 대기 중..."
          if ! aws ssm wait command-executed \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${BACKEND_INSTANCE_ID}"; then
            echo "::warning::wait 가 timeout 되었을 수 있습니다. 실제 결과를 아래에서 확인합니다."
          fi

          STATUS=$(aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${BACKEND_INSTANCE_ID}" \
            --query "Status" --output text)

          echo "===== SSM stdout ====="
          aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${BACKEND_INSTANCE_ID}" \
            --query "StandardOutputContent" --output text

          echo "===== SSM stderr ====="
          aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${BACKEND_INSTANCE_ID}" \
            --query "StandardErrorContent" --output text

          echo "배포 상태: ${STATUS}"
          if [ "${STATUS}" != "Success" ]; then
            echo "::error::배포 실패 (status=${STATUS})"
            exit 1
          fi