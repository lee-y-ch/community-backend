name: Backend CI/CD

on:
  push:
    branches:
      - main       # 빌드 + ECR push + 배포
      - develop    # 빌드 검증만

permissions:
  id-token: write   # OIDC 토큰 발급용
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 501479502338.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: community/backend
  BACKEND_INSTANCE_ID: i-0e64cceeae8779491

jobs:
  build-and-deploy:
    name: Build (& Deploy on main)
    # 배포 대상 EC2(Graviton)가 ARM64 이므로 arm64 네이티브 러너에서 빌드한다.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - run: chmod +x ./gradlew

      - name: Compute image tag
        id: meta
        run: echo "image_tag=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::501479502338:role/leo-github-actions-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@v2

      # 불변 태그라 이미 있는 태그를 재push 하면 실패한다.
      # 존재하면 build/push 를 건너뛰어 re-run/재배포에도 안전하게 한다.
      - name: Check if image tag exists in ECR
        id: check
        if: github.ref == 'refs/heads/main'
        run: |
          if aws ecr describe-images --repository-name "${ECR_REPOSITORY}" \
              --image-ids imageTag="${{ steps.meta.outputs.image_tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ] && [ "${{ steps.check.outputs.exists }}" = "false" ]; then
            docker build -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${{ steps.meta.outputs.image_tag }}" .
          elif [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            docker build -t community-backend:ci-check .   # develop: 빌드 검증만
          fi

      - name: Push image to ECR
        if: github.ref == 'refs/heads/main' && steps.check.outputs.exists == 'false'
        run: docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${{ steps.meta.outputs.image_tag }}"

      - name: Deploy via SSM Run Command
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${BACKEND_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy community-backend ${IMAGE_TAG}" \
            --parameters commands="cd /home/ubuntu/community-backend && bash deploy.sh ${IMAGE_TAG}" \
            --query "Command.CommandId" --output text)

          aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" --instance-id "${BACKEND_INSTANCE_ID}" || true
        
          # 배포 결과 출력 (실패 원인 확인용)
          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" --instance-id "${BACKEND_INSTANCE_ID}" \
            --query "StandardOutputContent" --output text
          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" --instance-id "${BACKEND_INSTANCE_ID}" \
            --query "StandardErrorContent" --output text

          STATUS=$(aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" --instance-id "${BACKEND_INSTANCE_ID}" \
            --query "Status" --output text)
          [ "${STATUS}" = "Success" ] || { echo "::error::deploy failed (${STATUS})"; exit 1; }