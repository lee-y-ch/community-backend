
name: Build Cache Measure

on:
  workflow_dispatch:

jobs:
  measure:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      # WITH cache 만 단독 실행 (앞 step 의 로컬 레이어 도움 없이 순수 gha 캐시 효과 측정)
      #   1회차(캐시 비움 후): 캐시 미스 = 진짜 baseline
      #   2회차 이후: gha 캐시 히트 = 순수 캐시 효과
      - name: Build WITH cache (gha only)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          push: false
          tags: measure:cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
#